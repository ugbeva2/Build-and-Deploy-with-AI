<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <div class="header-top">
                <div>
                    <h1>My Tasks <span class="emoji">📝</span></h1>
                    <p class="subtitle">Stick to it, one note at a time!</p>
                </div>
                <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                    <i class="fa-solid fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="taskInput"
                placeholder="What do you need to do? 🤔"
                autocomplete="off"
            >
            <div class="date-wrap">
                <i class="fa-regular fa-calendar date-icon"></i>
                <input type="date" id="dateInput">
            </div>
            <button id="addBtn">
                <i class="fa-solid fa-plus"></i>
                Add
            </button>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <span class="kbd-hint"><kbd>⌫</kbd> delete selected</span>
        </div>

        <div class="task-header">
            <span class="task-count" id="taskCount"></span>
            <button class="clear-btn" id="clearBtn">
                <i class="fa-solid fa-broom"></i>
                Clear done
            </button>
        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
