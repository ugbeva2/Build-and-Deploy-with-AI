kind = "web"
previewPath = "/"
title = "Todo List"
version = "1.0.0"
id = "artifacts/todo-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25230

[services.development]
run = "pnpm --filter @workspace/todo-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/todo-app", "run", "build" ]
publicDir = "artifacts/todo-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25230"
BASE_PATH = "/"
