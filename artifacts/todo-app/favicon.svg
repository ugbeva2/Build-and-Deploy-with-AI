<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- sticky note background -->
  <rect x="4" y="4" width="24" height="24" rx="3" ry="3" fill="#fff9a3"/>
  <!-- folded corner -->
  <polygon points="22,4 28,10 22,10" fill="#e8d800" opacity="0.7"/>
  <!-- check lines -->
  <line x1="9" y1="13" x2="23" y2="13" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="9" y1="18" x2="23" y2="18" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round"/>
  <!-- checkmark on last line -->
  <polyline points="9,23 12,26 19,22" fill="none" stroke="#4caf50" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
